version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    assignees:
      - aszili

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
    assignees:
      - aszili
    ignore:
      - dependency-name: python
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    assignees:
      - aszili